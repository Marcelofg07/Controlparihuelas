<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Parihuelas — Patio (En línea)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#f3f6fa; --panel:#ffffff; --panel-2:#eef4fa; --line:#d7e2ee; --ink:#0d2038; --muted:#5c7089;
    --amber:#08B2FF; --amber-ink:#00205B; --danger:#c8402b; --danger-bg:#fbe7e4; --success:#1f8a5f; --success-bg:#e3f5ec;
    --mono:'IBM Plex Mono',monospace; --sans:'Inter',sans-serif; --disp:'Space Grotesk',sans-serif; --radius:3px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;}
  header{background:#ffffff;border-bottom:3px solid var(--amber-ink);padding:14px 22px;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,32,91,.06);}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand .mark{width:38px;height:38px;background:var(--amber-ink);border-radius:2px;display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:600;color:#fff;font-size:12px;}
  .brand h1{font-family:var(--disp);font-size:17px;margin:0;color:var(--amber-ink);}
  .brand span.sub{display:block;color:var(--muted);font-size:11px;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase;}
  select,input,textarea{background:var(--panel-2);color:var(--ink);border:1px solid var(--line);border-radius:var(--radius);padding:8px 10px;font-family:var(--sans);font-size:13px;width:100%;}
  select:focus,input:focus,textarea:focus{outline:2px solid var(--amber);outline-offset:1px;}
  .badge-role{font-family:var(--mono);font-size:11px;color:var(--amber);border:1px solid var(--amber);padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px;}
  nav.tabs{display:flex;gap:2px;background:var(--panel);border-bottom:1px solid var(--line);padding:0 22px;overflow-x:auto;}
  nav.tabs button{background:transparent;border:none;color:var(--muted);padding:12px 16px;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:13px;border-bottom:2px solid transparent;white-space:nowrap;}
  nav.tabs button:hover{color:var(--ink);}
  nav.tabs button.active{color:var(--amber);border-bottom:2px solid var(--amber);}
  main{padding:22px;max-width:1280px;margin:0 auto;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:20px;margin-bottom:20px;}
  .panel h2{font-family:var(--disp);font-size:16px;margin:0 0 4px 0;}
  .panel .desc{color:var(--muted);font-size:12.5px;margin-bottom:16px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;}
  label{display:block;font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;font-weight:600;}
  button.btn{background:var(--amber);color:var(--amber-ink);border:none;padding:10px 18px;border-radius:var(--radius);font-weight:700;cursor:pointer;font-family:var(--sans);font-size:13px;}
  button.btn:hover{filter:brightness(1.08);}
  button.btn.secondary{background:transparent;color:var(--ink);border:1px solid var(--line);}
  button.btn.secondary:hover{border-color:var(--amber);color:var(--amber);}
  button.btn.small{padding:5px 10px;font-size:12px;}
  .actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{text-align:left;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--line);padding:9px 10px;white-space:nowrap;}
  tbody td{padding:9px 10px;border-bottom:1px solid #eaf0f6;vertical-align:middle;}
  tbody tr:hover{background:#f3f9ff;}
  .mono{font-family:var(--mono);}
  .tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-family:var(--mono);font-weight:600;}
  .tag.pend{background:#e6f6ff;color:#0077b3;}
  .tag.ok{background:var(--success-bg);color:var(--success);}
  .tag.cancel{background:var(--danger-bg);color:var(--danger);}
  .tag.warn{background:#fdf0dd;color:#b56a00;}
  .icon-x{cursor:pointer;color:var(--danger);font-weight:700;border:1px solid var(--danger);border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;background:transparent;}
  .icon-x:hover{background:var(--danger);color:#fff;}
  .empty{color:var(--muted);font-style:italic;padding:20px 0;text-align:center;}
  .diff-ok{color:var(--success);font-weight:700;}
  .diff-bad{color:var(--danger);font-weight:700;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .toolbar .stats{color:var(--muted);font-size:12px;font-family:var(--mono);}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--panel);border:1px solid var(--amber);color:var(--ink);padding:12px 18px;border-radius:6px;font-size:13px;z-index:200;box-shadow:0 6px 20px rgba(0,32,91,.15);max-width:340px;}
  .toast.err{border-color:var(--danger);}
  #loginScreen{max-width:380px;margin:80px auto;padding:30px;background:var(--panel);border:1px solid var(--line);border-radius:8px;}
  #loginScreen h2{font-family:var(--disp);}
  #loginScreen .field{margin-bottom:14px;}
  .connbadge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-family:var(--mono);}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--success);}
  .dot.off{background:var(--danger);}
  footer.note{color:var(--muted);font-size:11.5px;text-align:center;padding:20px;border-top:1px solid var(--line);}
</style>
</head>
<body>

<div id="loginScreen" style="display:none">
  <h2>Ingresar al sistema</h2>
  <p style="color:var(--muted);font-size:12.5px;">Elige tu área e ingresa la contraseña asignada.</p>
  <form id="formLogin">
    <div class="field"><label>Área / Rol</label>
      <select id="loginRole"></select>
    </div>
    <div class="field"><label>Contraseña</label><input type="password" id="loginPass" required></div>
    <button class="btn" type="submit" style="width:100%">Ingresar</button>
    <p id="loginError" style="color:var(--danger);font-size:12.5px;margin-top:10px;"></p>
  </form>
</div>

<div id="appRoot" style="display:none">
  <header>
    <div class="brand">
      <div class="mark">SW</div>
      <div><h1>Control de Parihuelas</h1><span class="sub">Patio &middot; En línea (Firebase)</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span class="connbadge"><span class="dot" id="connDot"></span><span id="connText">conectando…</span></span>
      <span class="badge-role" id="roleBadge">—</span>
      <button class="btn secondary small" id="btnLogout">Cambiar de usuario</button>
    </div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="content"></main>
  <footer class="note">Conectado a Firebase · los cambios se sincronizan en tiempo real entre todos los usuarios.</footer>
</div>

<script>
/* ============================= FIREBASE CONFIG ============================= */
const firebaseConfig = {
  apiKey: "AIzaSyCXChfvIoLf0YkyzRdRmG3lrySDAYzHFZc",
  authDomain: "control-parihuelas-sw.firebaseapp.com",
  projectId: "control-parihuelas-sw",
  storageBucket: "control-parihuelas-sw.firebasestorage.app",
  messagingSenderId: "188066757137",
  appId: "1:188066757137:web:650460ba52111503fccfb0",
  measurementId: "G-GYW7J53MXT"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ============================= CONTRASEÑAS POR ÁREA ============================= */
const ROLE_PASSWORDS = {
  sol_pluspack: 'pluspack2026',
  sol_matei:    'matei2026',
  despachos:    'despachos2026',
  picadora:     'picadora2026',
  supervision:  'supervision2026',
  maestro:      'maestro2026'
};

/* ============================= CONFIG APP ============================= */
const ROLES = {
  sol_pluspack: { label:'Solicitante · Pluspack', solicitanteFijo:'Pluspack', tabs:['nueva','mis','stock'] },
  sol_matei:    { label:'Solicitante · Matei',    solicitanteFijo:'Matei',    tabs:['nueva','mis','stock'] },
  despachos:    { label:'Despachos',              tabs:['ingresar','movs','stock'] },
  picadora:     { label:'Op. Picadora',           tabs:['stockfis','recepcion','solicitudes','ingresos'] },
  supervision:  { label:'Supervisión',            tabs:['solicitudes','ingresos','stock'] },
  maestro:      { label:'Usuario Maestro',        tabs:['solicitar','ingresar','solicitudes','ingresos','stock','stockfis','recepcion','db'] },
};
const TAB_LABEL = {
  nueva:'Nueva solicitud', mis:'Mis solicitudes', stock:'Stock disponible',
  solicitar:'Solicitar parihuelas', ingresar:'Ingresar parihuelas', movs:'Mis movimientos',
  stockfis:'Stock físico', recepcion:'Recepción de correlativos',
  solicitudes:'Solicitudes', ingresos:'Ingresos', db:'Base de datos maestra'
};

const STOCK_INICIAL_SEED = [
  {cliente:'ETERNIT', tipo:'MADERA', medida:'1.10 X 1.50', cantidad:24},
  {cliente:'LINDLEY', tipo:'PLASTICO', medida:'1.00 X 1.20', cantidad:158},
  {cliente:'LINDLEY', tipo:'MADERA', medida:'1.00 X 1.20', cantidad:9},
  {cliente:'SOCIEDAD EXPORTADORA A VERTFRUT - 1', tipo:'1', medida:'0.80 X 1.60', cantidad:22},
  {cliente:'SOCIEDAD EXPORTADORA A VERTFRUT - 2', tipo:'2', medida:'1.00 X 1.20', cantidad:72},
  {cliente:'RAPEL', tipo:'MADERA', medida:'1.00 X 1.70', cantidad:1344},
  {cliente:'CELIMA', tipo:'MADERA', medida:'1.30 X 1.90', cantidad:8},
  {cliente:'AIB - AGROINDUSTRIAS', tipo:'MADERA', medida:'1.00 X 1.20', cantidad:17},
  {cliente:'AMCOR', tipo:'MADERA', medida:'1.05 X 1.25', cantidad:0},
  {cliente:'PACKING DEL CARMEN', tipo:'MADERA', medida:'1.00 X 1.20', cantidad:8},
  {cliente:'AQU ANQA', tipo:'MADERA', medida:'1.00 X 1.20', cantidad:-16},
  {cliente:'VILLACURI', tipo:'MADERA', medida:'1.00 X 1.20', cantidad:67},
  {cliente:'SOL DE OLMOS', tipo:'MADERA', medida:'-', cantidad:25},
  {cliente:'SUPERMERCADOS PERUANOS', tipo:'MADERA', medida:'-', cantidad:0},
  {cliente:'NESTLE PERU', tipo:'MADERA', medida:'1.00 X 1.20', cantidad:200},
  {cliente:'WETSFALIA', tipo:'MADERA', medida:'-', cantidad:0},
  {cliente:'LARAN', tipo:'MADERA', medida:'1.00 X 1.20', cantidad:100},
];

let STATE = {
  role:null, activeTab:null,
  solicitudes:[], ingresos:[], stock:[], stockFisico:[], stockInicial:[], recepciones:[], ajustes:[], inventarios:[]
};
let unsubs = [];

function pad(n,len){ return String(n).padStart(len,'0'); }
function fechaHoy(){ return new Date().toLocaleString('es-PE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function toast(msg,isErr){ const t=document.createElement('div'); t.className='toast'+(isErr?' err':''); t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3200); }
function stockKey(c,t,m){ return (c+'|'+t+'|'+m).toLowerCase().trim(); }
function comboKey(t,m){ return t+'|||'+m; }
function setConn(ok){ document.getElementById('connDot').classList.toggle('off',!ok); document.getElementById('connText').textContent = ok? 'en línea' : 'sin conexión'; }

const loginRoleSel = document.getElementById('loginRole');
loginRoleSel.innerHTML = Object.entries(ROLES).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');

document.getElementById('formLogin').addEventListener('submit', e=>{
  e.preventDefault();
  const role = loginRoleSel.value;
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  if(ROLE_PASSWORDS[role] !== pass){ errEl.textContent = 'Contraseña incorrecta para esta área.'; return; }
  errEl.textContent = '';
  STATE.role = role;
  STATE.activeTab = null;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appRoot').style.display='block';
  attachListeners();
});
document.getElementById('btnLogout').addEventListener('click', ()=>{
  unsubs.forEach(u=>u()); unsubs=[];
  STATE.role = null;
  document.getElementById('loginPass').value='';
  document.getElementById('appRoot').style.display='none';
  document.getElementById('loginScreen').style.display='block';
});

auth.onAuthStateChanged(user=>{
  if(!user){ auth.signInAnonymously().catch(err=>toast('Error de conexión: '+err.message, true)); return; }
  document.getElementById('loginScreen').style.display='block';
});

function attachListeners(){
  setConn(true);
  unsubs.push(db.collection('solicitudes').orderBy('fechaOrden','desc').onSnapshot(snap=>{
    STATE.solicitudes = snap.docs.map(d=>d.data()); recomputeStock(); render();
  }, ()=>setConn(false)));
  unsubs.push(db.collection('ingresos').orderBy('fechaOrden','desc').onSnapshot(snap=>{
    STATE.ingresos = snap.docs.map(d=>d.data()); recomputeStock(); render();
  }, ()=>setConn(false)));
  unsubs.push(db.collection('recepciones').orderBy('fechaOrden','desc').onSnapshot(snap=>{
    STATE.recepciones = snap.docs.map(d=>({id:d.id, ...d.data()})); render();
  }, ()=>setConn(false)));
  unsubs.push(db.collection('stockFisico').onSnapshot(snap=>{
    STATE.stockFisico = snap.docs.map(d=>d.data()); recomputeStock(); render();
  }, ()=>setConn(false)));
  unsubs.push(db.collection('stockInicial').onSnapshot(snap=>{
    STATE.stockInicial = snap.docs.map(d=>d.data()); recomputeStock(); render();
  }, ()=>setConn(false)));
  unsubs.push(db.collection('ajustes').onSnapshot(snap=>{
    STATE.ajustes = snap.docs.map(d=>d.data()); recomputeStock(); render();
  }, ()=>setConn(false)));
  unsubs.push(db.collection('inventarios').orderBy('fechaOrden','desc').onSnapshot(snap=>{
    STATE.inventarios = snap.docs.map(d=>({id:d.id, ...d.data()})); render();
  }, ()=>setConn(false)));
}

async function nextCorrelativo(tipo){
  const ref = db.collection('meta').doc('counters');
  return db.runTransaction(async t=>{
    const doc = await t.get(ref);
    const data = doc.exists? doc.data() : {sol:0, ing:0};
    if(tipo==='SOL'){ const v=(data.sol||0)+1; t.set(ref,{...data, sol:v},{merge:true}); return 'SOL-'+pad(v,5); }
    const v=(data.ing||0)+1; t.set(ref,{...data, ing:v},{merge:true}); return 'ING-'+pad(v,4);
  });
}

function recomputeStock(){
  const map = {};
  function ensure(c,t,m){ const k=stockKey(c,t,m); if(!map[k]) map[k]={cliente:c,tipo:t,medida:m,stockActual:0,stockFisico:null,fechaFisico:null}; return map[k]; }
  STATE.stockInicial.forEach(r=>{ ensure(r.cliente,r.tipo,r.medida).stockActual += Number(r.cantidad)||0; });
  STATE.ingresos.forEach(i=>{ ensure(i.cliente,i.tipo,i.medida).stockActual += Number(i.cantidad)||0; });
  STATE.solicitudes.filter(s=>s.estado==='Recepcionada').forEach(s=>{ ensure(s.cliente,s.tipo,s.medida).stockActual -= Number(s.cantidadRecibida ?? s.cantidad)||0; });
  STATE.ajustes.forEach(a=>{ ensure(a.cliente,a.tipo,a.medida).stockActual += Number(a.cantidad)||0; });
  STATE.stockFisico.forEach(f=>{ const row = ensure(f.cliente,f.tipo,f.medida); row.stockFisico = f.valor; row.fechaFisico = f.fecha; });
  STATE.stock = Object.values(map).sort((a,b)=>(a.cliente+a.tipo).localeCompare(b.cliente+b.tipo));
}

function combosPorCliente(){
  const map = {};
  function add(c,t,m){ if(!c||!t||!m) return; if(!map[c]) map[c]=new Set(); map[c].add(comboKey(t,m)); }
  STATE.stockInicial.forEach(r=>add(r.cliente,r.tipo,r.medida));
  STATE.ingresos.forEach(r=>add(r.cliente,r.tipo,r.medida));
  STATE.solicitudes.forEach(r=>add(r.cliente,r.tipo,r.medida));
  const result = {};
  Object.keys(map).sort().forEach(c=>{ result[c] = [...map[c]].map(s=>{const [tipo,medida]=s.split('|||'); return {tipo,medida};}); });
  return result;
}
function clientesUnicos(){ return Object.keys(combosPorCliente()); }

async function createSolicitud(data){
  const correlativo = await nextCorrelativo('SOL');
  const registro = { correlativo, fecha:fechaHoy(), fechaOrden:Date.now(),
    cliente:data.cliente, tipo:data.tipo, medida:data.medida, cantidad:Number(data.cantidad),
    solicitante:data.solicitante, creadoPor:ROLES[STATE.role].label,
    estado:'Pendiente', cantidadRecibida:null, fechaRecepcion:null };
  await db.collection('solicitudes').doc(correlativo).set(registro);
  toast('Solicitud '+correlativo+' generada');
  return registro;
}
async function cancelarSolicitud(correlativo){
  const s = STATE.solicitudes.find(x=>x.correlativo===correlativo);
  if(!s) return;
  if(s.estado==='Recepcionada'){ toast('No se puede cancelar: ya fue recepcionada en picadora', true); return; }
  if(!confirm('¿Cancelar la solicitud '+correlativo+'?')) return;
  await db.collection('solicitudes').doc(correlativo).update({estado:'Cancelada'});
  toast('Solicitud '+correlativo+' cancelada');
}
async function createIngreso(data){
  const correlativo = await nextCorrelativo('ING');
  const registro = { correlativo, fecha:fechaHoy(), fechaOrden:Date.now(),
    cliente:data.cliente, tipo:data.tipo, medida:data.medida, cantidad:Number(data.cantidad),
    ingresante:'Despachos', guia:data.guia };
  await db.collection('ingresos').doc(correlativo).set(registro);
  toast('Ingreso '+correlativo+' registrado. Guarda el PDF de la guía en tu carpeta compartida.');
  return registro;
}
async function recepcionarCorrelativo(correlativo, cantidadRecibida){
  correlativo = correlativo.trim().toUpperCase();
  const ref = db.collection('solicitudes').doc(correlativo);
  const doc = await ref.get();
  const log = { fecha:fechaHoy(), fechaOrden:Date.now(), correlativo, resultado:'', detalle:'' };
  if(!doc.exists){ log.resultado='No encontrado'; log.detalle='No existe una solicitud con ese correlativo'; }
  else{
    const s = doc.data();
    if(s.estado==='Cancelada'){ log.resultado='Cancelada'; log.detalle='La solicitud fue cancelada, no debe entregarse'; }
    else if(s.estado==='Recepcionada'){ log.resultado='Duplicado'; log.detalle='Ya fue recepcionada el '+s.fechaRecepcion; }
    else{
      const cantSol=Number(s.cantidad), cantRec=Number(cantidadRecibida)||cantSol;
      await ref.update({ estado:'Recepcionada', cantidadRecibida:cantRec, fechaRecepcion:fechaHoy() });
      if(cantRec===cantSol){ log.resultado='OK'; log.detalle=cantRec+' unid. coinciden con lo solicitado'; }
      else{ log.resultado='Discrepancia'; log.detalle='Solicitado '+cantSol+' / Recibido físicamente '+cantRec; }
    }
  }
  await db.collection('recepciones').add(log);
  return log;
}
async function guardarYSincerarFisico(){
  const inputs = document.querySelectorAll('[data-fisico]');
  let cambios = 0;
  for(const inp of inputs){
    const k = inp.dataset.fisico;
    const row = STATE.stock.find(r=>stockKey(r.cliente,r.tipo,r.medida)===k);
    if(!row) continue;
    const val = inp.value===''? null : Number(inp.value);
    if(val===null) continue;
    const antes = row.stockActual;
    const diff = val - antes;
    await db.collection('ajustes').doc(k).set({
      cliente:row.cliente, tipo:row.tipo, medida:row.medida,
      cantidad: firebase.firestore.FieldValue.increment(diff)
    }, { merge:true });
    await db.collection('inventarios').add({
      fecha:fechaHoy(), fechaOrden:Date.now(),
      cliente:row.cliente, tipo:row.tipo, medida:row.medida,
      stockSistemaAntes:antes, stockFisico:val, diferencia:diff,
      diferenciaPct: antes!==0 ? Number(((diff/antes)*100).toFixed(1)) : (val!==0 ? 100 : 0),
      realizadoPor: ROLES[STATE.role].label
    });
    /* Ya se aplicó el conteo al stock: se limpia para que no quede "pegado" en pantalla */
    await db.collection('stockFisico').doc(k).set({ cliente:row.cliente, tipo:row.tipo, medida:row.medida, valor:null, fecha:fechaHoy() });
    inp.value = '';
    cambios++;
  }
  toast(cambios? 'Stock actualizado con el conteo físico ('+cambios+' línea(s)). El campo de stock físico se reinició.' : 'No había valores de conteo físico que guardar');
}
async function sembrarStockInicial(){
  const existing = await db.collection('stockInicial').limit(1).get();
  if(!existing.empty){ toast('El stock inicial ya fue cargado antes.', true); return; }
  const batch = db.batch();
  STOCK_INICIAL_SEED.forEach(r=>{ const k = stockKey(r.cliente,r.tipo,r.medida); batch.set(db.collection('stockInicial').doc(k), r); });
  await batch.commit();
  toast('Stock inicial cargado ('+STOCK_INICIAL_SEED.length+' líneas)');
}

function printWindow(title, bodyHtml){
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${title}</title><style>

function bindWidgetClienteCombo(idPrefix){
  const combos = combosPorCliente();
  const selCliente = document.getElementById(idPrefix+'Cliente');
  const inpClienteNuevo = document.getElementById(idPrefix+'ClienteNuevo');
  const selCombo = document.getElementById(idPrefix+'Combo');
  const comboManual = document.getElementById(idPrefix+'ComboManual');
  if(!selCliente) return;
  function refreshCombo(){
    const cliente = selCliente.value;
    if(cliente==='__nuevo__'){
      inpClienteNuevo.style.display='block';
      selCombo.innerHTML = `<option value="__nuevo__">+ Nueva combinación…</option>`;
      selCombo.value='__nuevo__';
      comboManual.style.display='block';
      return;
    }
    inpClienteNuevo.style.display='none';
    const opciones = combos[cliente] || [];
    selCombo.innerHTML = (opciones.length? opciones.map(o=>`<option value="${comboKey(o.tipo,o.medida)}">${o.tipo} — ${o.medida}</option>`).join('') : '')
      + `<option value="__nuevo__">+ Nueva combinación…</option>`;
    comboManual.style.display='none';
  }
  selCliente.addEventListener('change', refreshCombo);
  selCombo.addEventListener('change', ()=>{ comboManual.style.display = selCombo.value==='__nuevo__' ? 'block' : 'none'; });
  if(selCliente.value) refreshCombo();
}
function leerClienteCombo(idPrefix){
  const selCliente = document.getElementById(idPrefix+'Cliente');
  const inpClienteNuevo = document.getElementById(idPrefix+'ClienteNuevo');
  const selCombo = document.getElementById(idPrefix+'Combo');
  const tipoNuevo = document.getElementById(idPrefix+'TipoNuevo');
  const medidaNuevo = document.getElementById(idPrefix+'MedidaNuevo');
  const cliente = selCliente.value==='__nuevo__' ? inpClienteNuevo.value.trim() : selCliente.value;
  let tipo, medida;
  if(selCombo.value==='__nuevo__'){ tipo = tipoNuevo.value.trim(); medida = medidaNuevo.value.trim(); }
  else{ [tipo, medida] = selCombo.value.split('|||'); }
  return { cliente, tipo, medida };
}

function tablaStock(rows, editableFisico){
  if(!rows.length) return '<div class="empty">Aún no hay stock registrado.</div>';
  return `<table><thead><tr><th>Cliente</th><th>Tipo</th><th>Medidas</th><th>Stock actual</th>${editableFisico?'<th>Stock físico</th><th>Diferencia</th>':''}</tr></thead><tbody>
    ${rows.map(r=>{
      const k = stockKey(r.cliente,r.tipo,r.medida);
      let diffCell='';
      if(editableFisico){ const diff=(r.stockFisico===null||r.stockFisico===undefined)?null:r.stockFisico-r.stockActual;
        diffCell = `<td class="${diff===null?'':(diff===0?'diff-ok':'diff-bad')}">${diff===null?'—':(diff>0?'+':'')+diff}</td>`; }
      return `<tr><td>${r.cliente}</td><td>${r.tipo}</td><td class="mono">${r.medida}</td><td class="mono">${r.stockActual}</td>
        ${editableFisico?`<td><input type="number" style="width:90px" data-fisico="${k}" value="${r.stockFisico??''}" placeholder="—"></td>`:''}
        ${editableFisico?diffCell:''}</tr>`;
    }).join('')}</tbody></table>`;
}

function bindDBMaestra(){
  document.querySelectorAll('[data-guardar-sol]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const correlativo = btn.dataset.guardarSol;
    const tr = btn.closest('tr');
    const get = f=>tr.querySelector(`[data-f="${f}"]`).value;
    const cantRec = get('cantidadRecibida');
    await db.collection('solicitudes').doc(correlativo).update({
      cliente:get('cliente').trim(), tipo:get('tipo').trim(), medida:get('medida').trim(),
      cantidad:Number(get('cantidad')), cantidadRecibida: cantRec===''? null : Number(cantRec),
      solicitante:get('solicitante'), estado:get('estado')
    });
    toast('Solicitud '+correlativo+' actualizada');
  }));
  document.querySelectorAll('[data-del-sol]').forEach(el=>el.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar definitivamente la solicitud '+el.dataset.delSol+'? No se puede deshacer.')) return;
    await db.collection('solicitudes').doc(el.dataset.delSol).delete();
    toast('Solicitud eliminada');
  }));
  document.querySelectorAll('[data-guardar-ing]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const correlativo = btn.dataset.guardarIng;
    const tr = btn.closest('tr');
    const get = f=>tr.querySelector(`[data-f="${f}"]`).value;
    await db.collection('ingresos').doc(correlativo).update({
      cliente:get('cliente').trim(), tipo:get('tipo').trim(), medida:get('medida').trim(),
      cantidad:Number(get('cantidad')), guia:get('guia').trim()
    });
    toast('Ingreso '+correlativo+' actualizado');
  }));
  document.querySelectorAll('[data-del-ing]').forEach(el=>el.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar definitivamente el ingreso '+el.dataset.delIng+'? No se puede deshacer.')) return;
    await db.collection('ingresos').doc(el.dataset.delIng).delete();
    toast('Ingreso eliminado');
  }));
  document.querySelectorAll('[data-guardar-rec]').forEach(btn=>btn.addEventListener('click', async ()=>{
    const id = btn.dataset.guardarRec;
    const tr = btn.closest('tr');
    const get = f=>tr.querySelector(`[data-f="${f}"]`).value;
    await db.collection('recepciones').doc(id).update({ resultado:get('resultado'), detalle:get('detalle').trim() });
    toast('Recepción actualizada');
  }));
  document.querySelectorAll('[data-del-rec]').forEach(el=>el.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar esta recepción del historial? No se puede deshacer.')) return;
    await db.collection('recepciones').doc(el.dataset.delRec).delete();
    toast('Recepción eliminada');
  }));
  document.querySelectorAll('[data-del-inv]').forEach(el=>el.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar este registro de inventario del historial? No se puede deshacer.')) return;
    await db.collection('inventarios').doc(el.dataset.delInv).delete();
    toast('Registro de inventario eliminado');
  }));
}

function render(){
  const role = ROLES[STATE.role];
  document.getElementById('roleBadge').textContent = role.label;
  const tabsEl = document.getElementById('tabs');
  if(!STATE.activeTab || !role.tabs.includes(STATE.activeTab)) STATE.activeTab = role.tabs[0];
  tabsEl.innerHTML = role.tabs.map(t=>`<button data-tab="${t}" class="${t===STATE.activeTab?'active':''}">${TAB_LABEL[t]}</button>`).join('');
  tabsEl.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{STATE.activeTab=b.dataset.tab; render();}));
  const content = document.getElementById('content');
  const solicitanteFijo = role.solicitanteFijo || null;
  switch(STATE.activeTab){
    case 'nueva': content.innerHTML=renderNuevaSolicitud(solicitanteFijo); bindFormSolicitud(); bindWidgetClienteCombo('sol'); break;
    case 'mis': content.innerHTML=renderMisSolicitudes(solicitanteFijo); bindTablaSolicitudes(); break;
    case 'solicitar': content.innerHTML=renderNuevaSolicitud(null); bindFormSolicitud(); bindWidgetClienteCombo('sol'); break;
    case 'ingresar': content.innerHTML=renderIngresar(); bindFormIngreso(); bindWidgetClienteCombo('ing'); break;
    case 'movs': content.innerHTML=renderMovs(); bindTablaIngresos(); break;
    case 'stock': content.innerHTML=renderStockPanel(); break;
    case 'stockfis': content.innerHTML=renderStockFisicoPicadora(); bindStockFisico(); break;
    case 'recepcion': content.innerHTML=renderRecepcionPicadora(); bindRecepcion(); break;
    case 'solicitudes':
      content.innerHTML = `<div class="panel"><div class="toolbar"><h2 style="margin:0">Solicitudes</h2><button class="btn secondary" id="btnImprimirPend2">Imprimir pendientes</button></div></div>` + renderMisSolicitudes(null);
      document.getElementById('btnImprimirPend2').addEventListener('click', imprimirSolicitudesPendientes);
      bindTablaSolicitudes(); break;
    case 'ingresos': content.innerHTML=renderMovs(); bindTablaIngresos(); break;
    case 'db': content.innerHTML=renderDBMaestra(); bindDBMaestra();
      document.getElementById('btnSembrar').addEventListener('click', sembrarStockInicial); break;
  }
}

function stockDisponible(cliente, tipo, medida){
  const row = STATE.stock.find(r=>stockKey(r.cliente,r.tipo,r.medida)===stockKey(cliente,tipo,medida));
  return row ? Number(row.stockActual)||0 : 0;
}
function bindFormSolicitud(){
  const f=document.getElementById('formSolicitud'); if(!f) return;
  f.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd=new FormData(f);
    const {cliente, tipo, medida} = leerClienteCombo('sol');
    if(!cliente || !tipo || !medida){ toast('Completa cliente, tipo y medida', true); return; }
    const cantidad = Number(fd.get('cantidad'));
    const disponible = stockDisponible(cliente, tipo, medida);
    if(cantidad > disponible){
      toast('No hay stock suficiente. Stock actual: '+disponible, true);
      return;
    }
    await createSolicitud({ tipo, medida, cliente, cantidad, solicitante:fd.get('solicitanteFijo')||fd.get('solicitante') });
    f.reset(); bindWidgetClienteCombo('sol');
  });
}
function bindTablaSolicitudes(){
  document.querySelectorAll('[data-cancel]').forEach(el=>el.addEventListener('click',()=>cancelarSolicitud(el.dataset.cancel)));
  document.querySelectorAll('[data-pdf]').forEach(el=>el.addEventListener('click',()=>{ const s=STATE.solicitudes.find(x=>x.correlativo===el.dataset.pdf); if(s) pdfSolicitud(s); }));
  const btn=document.getElementById('btnImprimirPend'); if(btn) btn.addEventListener('click', imprimirSolicitudesPendientes);
}
function bindFormIngreso(){
  const f=document.getElementById('formIngreso'); if(!f) return;
  f.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd=new FormData(f);
    const {cliente, tipo, medida} = leerClienteCombo('ing');
    if(!cliente || !tipo || !medida){ toast('Completa cliente, tipo y medida', true); return; }
    await createIngreso({ cliente, tipo, medida, cantidad:fd.get('cantidad'), guia:fd.get('guia') });
    f.reset(); bindWidgetClienteCombo('ing');
  });
}
function bindTablaIngresos(){ document.querySelectorAll('[data-pdfing]').forEach(el=>el.addEventListener('click',()=>{ const i=STATE.ingresos.find(x=>x.correlativo===el.dataset.pdfing); if(i) pdfIngreso(i); })); }
function bindStockFisico(){
  const bi=document.getElementById('btnImprimirHoja'); if(bi) bi.addEventListener('click', imprimirHojaInventario);
  const bg=document.getElementById('btnGuardarFisico'); if(bg) bg.addEventListener('click', async ()=>{
    bg.disabled = true; bg.textContent = 'Guardando…';
    try{ await guardarYSincerarFisico(); } finally { bg.disabled=false; bg.textContent='Guardar y actualizar stock según físico'; }
  });
}
function bindRecepcion(){
  const f=document.getElementById('formRecepcion'); if(!f) return;
  f.addEventListener('submit', async e=>{ e.preventDefault(); const fd=new FormData(f);
    const log = await recepcionarCorrelativo(fd.get('correlativo'), fd.get('cantidadRecibida'));
    if(log.resultado==='OK') toast('Recepción OK — '+log.detalle); else toast(log.resultado+': '+log.detalle, true);
    f.reset(); });
}

window.addEventListener('error', e=>toast('Error: '+(e.message||e), true));
window.addEventListener('unhandledrejection', e=>toast('Error: '+(e.reason && e.reason.message || e.reason), true));
</script>
</body>
</html>
