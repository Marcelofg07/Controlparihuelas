<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Parihuelas — Patio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #14181c;
    --panel: #1c2126;
    --panel-2: #232933;
    --line: #333c46;
    --ink: #eef1f4;
    --muted: #8f9aa6;
    --amber: #f5a623;
    --amber-ink: #1a1400;
    --blue: #4fa3e3;
    --danger: #e5573f;
    --danger-bg: #3a2320;
    --success: #59b287;
    --success-bg: #17332a;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Inter', sans-serif;
    --disp: 'Space Grotesk', sans-serif;
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;}
  ::selection{background:var(--amber);color:var(--amber-ink);}

  /* HEADER */
  header{
    background:linear-gradient(180deg,#1a1f24,#14181c);
    border-bottom:2px solid var(--amber);
    padding:14px 22px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
    position:sticky; top:0; z-index:50;
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .mark{
    width:38px;height:38px;border:2px solid var(--amber); border-radius:2px;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-weight:600;color:var(--amber);font-size:12px;
    transform:rotate(0deg);
  }
  .brand h1{font-family:var(--disp);font-size:17px;margin:0;letter-spacing:.2px;}
  .brand span.sub{display:block;color:var(--muted);font-size:11px;font-family:var(--mono);letter-spacing:.5px;text-transform:uppercase;}
  .role-picker{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  select, input, textarea{
    background:var(--panel-2); color:var(--ink); border:1px solid var(--line);
    border-radius:var(--radius); padding:8px 10px; font-family:var(--sans); font-size:13px;
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--amber); outline-offset:1px;}
  .badge-role{
    font-family:var(--mono); font-size:11px; color:var(--amber); border:1px solid var(--amber);
    padding:3px 8px; border-radius:20px; text-transform:uppercase; letter-spacing:.5px;
  }

  /* TABS */
  nav.tabs{display:flex; gap:2px; background:var(--panel); border-bottom:1px solid var(--line); padding:0 22px; overflow-x:auto;}
  nav.tabs button{
    background:transparent;border:none;color:var(--muted); padding:12px 16px; cursor:pointer;
    font-family:var(--sans); font-weight:600; font-size:13px; border-bottom:2px solid transparent; white-space:nowrap;
  }
  nav.tabs button:hover{color:var(--ink);}
  nav.tabs button.active{color:var(--amber); border-bottom:2px solid var(--amber);}

  main{padding:22px; max-width:1280px; margin:0 auto;}
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:20px; margin-bottom:20px;}
  .panel h2{font-family:var(--disp); font-size:16px; margin:0 0 4px 0;}
  .panel .desc{color:var(--muted); font-size:12.5px; margin-bottom:16px;}

  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px;}
  label{display:block; font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:5px; font-weight:600;}
  .field{margin-bottom:2px;}
  select, input, textarea{width:100%;}

  button.btn{
    background:var(--amber); color:var(--amber-ink); border:none; padding:10px 18px;
    border-radius:var(--radius); font-weight:700; cursor:pointer; font-family:var(--sans); font-size:13px;
    letter-spacing:.2px;
  }
  button.btn:hover{filter:brightness(1.08);}
  button.btn.secondary{background:transparent; color:var(--ink); border:1px solid var(--line);}
  button.btn.secondary:hover{border-color:var(--amber); color:var(--amber);}
  button.btn.danger{background:var(--danger); color:#fff;}
  button.btn.small{padding:5px 10px; font-size:12px;}
  .actions{display:flex; gap:10px; margin-top:14px; flex-wrap:wrap;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  thead th{
    text-align:left; font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.5px;
    color:var(--muted); border-bottom:1px solid var(--line); padding:9px 10px; white-space:nowrap;
  }
  tbody td{padding:9px 10px; border-bottom:1px solid #262c33; vertical-align:middle;}
  tbody tr:hover{background:#20262c;}
  .mono{font-family:var(--mono);}
  .tag{display:inline-block; padding:2px 8px; border-radius:20px; font-size:11px; font-family:var(--mono); font-weight:600;}
  .tag.pend{background:#33301a; color:var(--amber);}
  .tag.ok{background:var(--success-bg); color:var(--success);}
  .tag.cancel{background:var(--danger-bg); color:var(--danger);}
  .tag.warn{background:#3a2320; color:#ffb199;}
  .icon-x{
    cursor:pointer; color:var(--danger); font-weight:700; border:1px solid var(--danger); border-radius:50%;
    width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; font-size:13px; background:transparent;
  }
  .icon-x:hover{background:var(--danger); color:#fff;}
  .empty{color:var(--muted); font-style:italic; padding:20px 0; text-align:center;}
  .diff-ok{color:var(--success); font-weight:700;}
  .diff-bad{color:var(--danger); font-weight:700;}
  .toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
  .toolbar .stats{color:var(--muted); font-size:12px; font-family:var(--mono);}
  .toast{
    position:fixed; bottom:20px; right:20px; background:var(--panel-2); border:1px solid var(--amber); color:var(--ink);
    padding:12px 18px; border-radius:6px; font-size:13px; z-index:200; box-shadow:0 6px 20px rgba(0,0,0,.4);
    max-width:340px;
  }
  .toast.err{border-color:var(--danger);}
  .split{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  @media(max-width:820px){ .split{grid-template-columns:1fr;} }
  input[type=file]{padding:6px;}
  .hint{color:var(--muted); font-size:11.5px; margin-top:4px;}
  .kpi{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:16px;}
  .kpi .box{background:var(--panel-2); border:1px solid var(--line); border-radius:6px; padding:12px 18px; min-width:130px;}
  .kpi .box b{display:block; font-family:var(--disp); font-size:22px;}
  .kpi .box span{color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.4px;}
  footer.note{color:var(--muted); font-size:11.5px; text-align:center; padding:20px; border-top:1px solid var(--line);}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="mark">PYU</div>
    <div>
      <h1>Control de Parihuelas</h1>
      <span class="sub">Patio &middot; Registro en línea compartido</span>
    </div>
  </div>
  <div class="role-picker">
    <span class="badge-role" id="roleBadge">—</span>
    <select id="roleSelect"></select>
  </div>
</header>

<nav class="tabs" id="tabs"></nav>
<main id="content"></main>

<footer class="note">Prototipo funcional — los datos se guardan en almacenamiento compartido del navegador. Para producción se recomienda backend con autenticación real, base de datos y generación de PDF en servidor.</footer>

<script>
/* ============================= CONFIG ============================= */
const ROLES = {
  sol_pluspack: { label:'Solicitante · Pluspack', empresa:'Pluspack', tabs:['nueva','mis','stock'] },
  sol_matei:    { label:'Solicitante · Matei',    empresa:'Matei',    tabs:['nueva','mis','stock'] },
  despachos:    { label:'Despachos',              tabs:['solicitar','ingresar','movs','stock'] },
  picadora:     { label:'Op. Picadora',           tabs:['stockfis','recepcion'] },
  supervision:  { label:'Supervisión',            tabs:['solicitudes','ingresos','stock'] },
  maestro:      { label:'Usuario Maestro',        tabs:['solicitudes','ingresos','stock','recepcion','db'] },
};
const TAB_LABEL = {
  nueva:'Nueva solicitud', mis:'Mis solicitudes', stock:'Stock disponible',
  solicitar:'Solicitar parihuelas', ingresar:'Ingresar parihuelas', movs:'Mis movimientos',
  stockfis:'Stock físico', recepcion:'Recepción de correlativos',
  solicitudes:'Solicitudes', ingresos:'Ingresos', db:'Base de datos maestra'
};
const TIPOS_DEFAULT = ['Americana 100x120','Europea 80x120','Chep 100x120','Media parihuela 60x80'];
let STATE = {
  role: 'sol_pluspack',
  activeTab: 'nueva',
  solicitudes: [],
  ingresos: [],
  stock: [],
  recepciones: [],
  counters: { sol:0, ing:0 }
};

/* ============================= HELPERS ============================= */
function pad(n,len){ return String(n).padStart(len,'0'); }
function fechaHoy(){
  const d = new Date();
  return d.toLocaleString('es-PE',{ day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function toast(msg, isErr){
  const t=document.createElement('div');
  t.className='toast'+(isErr?' err':'');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}
function stockKey(cliente, tipo, medida){ return (cliente+'|'+tipo+'|'+medida).toLowerCase(); }

/* ============================= STORAGE ============================= */
async function loadAll(){
  STATE.solicitudes = await getJSON('parihuelas:solicitudes', []);
  STATE.ingresos    = await getJSON('parihuelas:ingresos', []);
  STATE.recepciones = await getJSON('parihuelas:recepciones', []);
  STATE.counters    = await getJSON('parihuelas:counters', {sol:0, ing:0});
  STATE.stock       = await getJSON('parihuelas:stock', []);
  recomputeStock(false);
}
async function getJSON(key, fallback){
  try{
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){ return fallback; }
}
async function setJSON(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), true); }
  catch(e){ toast('No se pudo guardar: '+key, true); }
}
async function saveSolicitudes(){ await setJSON('parihuelas:solicitudes', STATE.solicitudes); }
async function saveIngresos(){ await setJSON('parihuelas:ingresos', STATE.ingresos); }
async function saveRecepciones(){ await setJSON('parihuelas:recepciones', STATE.recepciones); }
async function saveCounters(){ await setJSON('parihuelas:counters', STATE.counters); }
async function saveStock(){ await setJSON('parihuelas:stock', STATE.stock); }

async function nextCorrelativo(tipo){
  if(tipo==='SOL'){ STATE.counters.sol++; await saveCounters(); return 'SOL-'+pad(STATE.counters.sol,5); }
  else { STATE.counters.ing++; await saveCounters(); return 'ING-'+pad(STATE.counters.ing,4); }
}

/* ============================= STOCK ENGINE ============================= */
function recomputeStock(persist=true){
  const map = {};
  // seed with existing physical counts so we don't lose them
  STATE.stock.forEach(r=>{ map[stockKey(r.cliente,r.tipo,r.medida)] = {...r, stockActual:0}; });
  function ensure(cliente,tipo,medida){
    const k = stockKey(cliente,tipo,medida);
    if(!map[k]) map[k] = { cliente, tipo, medida, stockActual:0, stockFisico:null, fechaFisico:null };
    return map[k];
  }
  STATE.ingresos.forEach(i=>{
    const row = ensure(i.cliente, i.tipo, i.medida);
    row.stockActual += Number(i.cantidad)||0;
  });
  STATE.solicitudes.filter(s=>s.estado==='Recepcionada').forEach(s=>{
    const row = ensure(s.solicitante, s.tipo, s.medida);
    row.stockActual -= Number(s.cantidadRecibida ?? s.cantidad)||0;
  });
  STATE.stock = Object.values(map).sort((a,b)=> (a.cliente+a.tipo).localeCompare(b.cliente+b.tipo));
  if(persist) saveStock();
}

/* ============================= CRUD: SOLICITUDES ============================= */
async function createSolicitud(data){
  const correlativo = await nextCorrelativo('SOL');
  const registro = {
    id: uid(), correlativo, fecha: fechaHoy(),
    tipo:data.tipo, medida:data.medida, cantidad:Number(data.cantidad),
    solicitante:data.solicitante, creadoPor:data.creadoPor,
    estado:'Pendiente', cantidadRecibida:null, fechaRecepcion:null
  };
  STATE.solicitudes.unshift(registro);
  await saveSolicitudes();
  recomputeStock();
  toast('Solicitud '+correlativo+' generada');
  return registro;
}
async function cancelarSolicitud(id){
  const s = STATE.solicitudes.find(x=>x.id===id);
  if(!s) return;
  if(s.estado==='Recepcionada'){ toast('No se puede cancelar: ya fue recepcionada en picadora', true); return; }
  if(!confirm('¿Cancelar la solicitud '+s.correlativo+'? Esta acción quedará registrada.')) return;
  s.estado='Cancelada';
  await saveSolicitudes();
  recomputeStock();
  render();
  toast('Solicitud '+s.correlativo+' cancelada');
}

/* ============================= CRUD: INGRESOS ============================= */
async function createIngreso(data, fileObj){
  const correlativo = await nextCorrelativo('ING');
  let guiaFile = null;
  if(fileObj){
    guiaFile = await fileToBase64(fileObj);
    await setJSON('guia:'+correlativo, { name:fileObj.name, data:guiaFile });
  }
  const registro = {
    id: uid(), correlativo, fecha: fechaHoy(),
    cliente:data.cliente, tipo:data.tipo, medida:data.medida, cantidad:Number(data.cantidad),
    ingresante:'Despachos', guia:data.guia, tieneGuiaPDF: !!fileObj
  };
  STATE.ingresos.unshift(registro);
  await saveIngresos();
  recomputeStock();
  toast('Ingreso '+correlativo+' registrado');
  return registro;
}
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

/* ============================= RECEPCION EN PICADORA ============================= */
async function recepcionarCorrelativo(correlativo, cantidadRecibida){
  correlativo = correlativo.trim().toUpperCase();
  const s = STATE.solicitudes.find(x=>x.correlativo===correlativo);
  const log = { id:uid(), fecha:fechaHoy(), correlativo, resultado:'', detalle:'' };
  if(!s){ log.resultado='No encontrado'; log.detalle='No existe una solicitud con ese correlativo'; }
  else if(s.estado==='Cancelada'){ log.resultado='Cancelada'; log.detalle='La solicitud fue cancelada, no debe entregarse'; }
  else if(s.estado==='Recepcionada'){ log.resultado='Duplicado'; log.detalle='Ya fue recepcionada el '+s.fechaRecepcion; }
  else{
    const cantSol = Number(s.cantidad);
    const cantRec = Number(cantidadRecibida)||cantSol;
    s.estado='Recepcionada';
    s.cantidadRecibida = cantRec;
    s.fechaRecepcion = fechaHoy();
    if(cantRec===cantSol){ log.resultado='OK'; log.detalle=cantRec+' unid. coinciden con lo solicitado'; }
    else{ log.resultado='Discrepancia'; log.detalle='Solicitado '+cantSol+' / Recibido físicamente '+cantRec; }
    await saveSolicitudes();
    recomputeStock();
  }
  STATE.recepciones.unshift(log);
  await saveRecepciones();
  return log;
}

/* ============================= STOCK FISICO ============================= */
async function guardarStockFisico(k, valor){
  const row = STATE.stock.find(r=>stockKey(r.cliente,r.tipo,r.medida)===k);
  if(!row) return;
  row.stockFisico = valor===''? null : Number(valor);
  row.fechaFisico = fechaHoy();
  await saveStock();
}

/* ============================= PRINT / PDF ============================= */
function printWindow(title, bodyHtml){
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${title}</title><style>
    body{font-family:Arial,Helvetica,sans-serif; padding:30px; color:#111;}
    h1{font-size:18px; border-bottom:2px solid #111; padding-bottom:8px;}
    table{width:100%; border-collapse:collapse; margin-top:14px;}
    th,td{border:1px solid #999; padding:7px 9px; font-size:12px; text-align:left;}
    th{background:#eee;}
    .meta{font-size:12px; margin:4px 0;}
    .signbox{margin-top:50px; display:flex; justify-content:space-between;}
    .signbox div{width:40%; border-top:1px solid #111; text-align:center; padding-top:6px; font-size:12px;}
  </style></head><body>${bodyHtml}<script>window.print();<\/script></body></html>`);
  w.document.close();
}
function pdfSolicitud(s){
  printWindow('Solicitud '+s.correlativo, `
    <h1>VALE DE SOLICITUD DE PARIHUELAS — ${s.correlativo}</h1>
    <p class="meta"><b>Fecha:</b> ${s.fecha}</p>
    <p class="meta"><b>Cliente / Solicitante:</b> ${s.solicitante}</p>
    <p class="meta"><b>Generado por:</b> ${s.creadoPor}</p>
    <table><tr><th>Tipo de parihuela</th><th>Medidas (LxA)</th><th>Cantidad</th><th>Estado</th></tr>
    <tr><td>${s.tipo}</td><td>${s.medida}</td><td>${s.cantidad}</td><td>${s.estado}</td></tr></table>
    <div class="signbox"><div>Entregado por (montacarguista)</div><div>Recibido por (picadora)</div></div>
  `);
}
function pdfIngreso(i){
  printWindow('Ingreso '+i.correlativo, `
    <h1>COMPROBANTE DE INGRESO DE PARIHUELAS — ${i.correlativo}</h1>
    <p class="meta"><b>Fecha:</b> ${i.fecha}</p>
    <p class="meta"><b>Cliente:</b> ${i.cliente}</p>
    <p class="meta"><b>Guía N°:</b> ${i.guia}</p>
    <p class="meta"><b>Ingresado por:</b> ${i.ingresante}</p>
    <table><tr><th>Tipo de parihuela</th><th>Medidas (LxA)</th><th>Cantidad</th></tr>
    <tr><td>${i.tipo}</td><td>${i.medida}</td><td>${i.cantidad}</td></tr></table>
  `);
}
function imprimirHojaInventario(){
  const rows = STATE.stock.map(r=>`<tr><td>${r.cliente}</td><td>${r.tipo}</td><td>${r.medida}</td><td>${r.stockActual}</td><td>&nbsp;</td></tr>`).join('');
  printWindow('Hoja de inventario físico', `
    <h1>HOJA DE TOMA DE INVENTARIO FÍSICO — PATIO DE PARIHUELAS</h1>
    <p class="meta"><b>Fecha:</b> ${fechaHoy()}</p>
    <p class="meta"><b>Operador:</b> ______________________________</p>
    <table><tr><th>Cliente</th><th>Tipo</th><th>Medidas</th><th>Stock sistema</th><th>Stock físico (llenar a mano)</th></tr>${rows}</table>
    <div class="signbox"><div>Operador de picadora</div><div>Supervisor</div></div>
  `);
}
function imprimirSolicitudesPendientes(){
  const pend = STATE.solicitudes.filter(s=>s.estado==='Pendiente');
  const rows = pend.map(s=>`<tr><td>${s.correlativo}</td><td>${s.fecha}</td><td>${s.solicitante}</td><td>${s.tipo}</td><td>${s.medida}</td><td>${s.cantidad}</td></tr>`).join('')
    || '<tr><td colspan="6">No hay solicitudes pendientes</td></tr>';
  printWindow('Solicitudes pendientes', `
    <h1>SOLICITUDES PENDIENTES DE ENTREGA — PARA MONTACARGUISTA</h1>
    <p class="meta"><b>Fecha de impresión:</b> ${fechaHoy()}</p>
    <table><tr><th>Correlativo</th><th>Fecha</th><th>Cliente</th><th>Tipo</th><th>Medidas</th><th>Cantidad</th></tr>${rows}</table>
  `);
}

/* ============================= RENDER: SHARED WIDGETS ============================= */
function tiposDatalist(id){
  return `<input list="${id}" name="tipo" required placeholder="Ej: Americana 100x120">
    <datalist id="${id}">${TIPOS_DEFAULT.map(t=>`<option value="${t}">`).join('')}</datalist>`;
}
function clientesUnicos(){
  const set = new Set(['Pluspack','Matei']);
  STATE.ingresos.forEach(i=>set.add(i.cliente));
  STATE.solicitudes.forEach(s=>set.add(s.solicitante));
  return [...set];
}

function tablaStock(rows, editableFisico){
  if(!rows.length) return '<div class="empty">Aún no hay stock registrado.</div>';
  return `<table><thead><tr><th>Cliente</th><th>Tipo</th><th>Medidas</th><th>Stock actual</th>
    ${editableFisico? '<th>Stock físico</th><th>Diferencia</th>':''}</tr></thead><tbody>
    ${rows.map(r=>{
      const k = stockKey(r.cliente,r.tipo,r.medida);
      let diffCell='';
      if(editableFisico){
        const diff = (r.stockFisico===null||r.stockFisico===undefined)? null : r.stockFisico - r.stockActual;
        diffCell = `<td class="${diff===null?'':(diff===0?'diff-ok':'diff-bad')}">${diff===null?'—':(diff>0?'+':'')+diff}</td>`;
      }
      return `<tr>
        <td>${r.cliente}</td><td>${r.tipo}</td><td class="mono">${r.medida}</td><td class="mono">${r.stockActual}</td>
        ${editableFisico? `<td><input type="number" style="width:90px" data-fisico="${k}" value="${r.stockFisico??''}" placeholder="—"></td>` : ''}
        ${editableFisico? diffCell : ''}
      </tr>`;
    }).join('')}
    </tbody></table>`;
}

function tagEstado(s){
  const map = {Pendiente:'pend', Recepcionada:'ok', Cancelada:'cancel', Discrepancia:'warn'};
  return `<span class="tag ${map[s]||'pend'}">${s}</span>`;
}

/* ============================= RENDER: TABS ============================= */
function renderNuevaSolicitud(empresaFija){
  const opciones = ['Pluspack','Matei','Despachos'];
  return `<div class="panel">
    <h2>Nueva solicitud de parihuelas</h2>
    <div class="desc">Fecha y correlativo se generan automáticamente al guardar.</div>
    <form id="formSolicitud">
      <div class="grid">
        <div class="field"><label>Fecha</label><input type="text" value="${fechaHoy()}" disabled></div>
        <div class="field"><label>Correlativo</label><input type="text" value="Se genera al guardar" disabled></div>
        <div class="field"><label>Tipo de parihuela</label>${tiposDatalist('tiposList1')}</div>
        <div class="field"><label>Medidas (LxA)</label><input name="medida" required placeholder="Ej: 120x100"></div>
        <div class="field"><label>Cantidad</label><input name="cantidad" type="number" min="1" required></div>
        <div class="field"><label>Solicitante</label>
          <select name="solicitante" ${empresaFija?'disabled':''}>
            ${opciones.map(o=>`<option value="${o}" ${empresaFija===o?'selected':''}>${o}</option>`).join('')}
          </select>
          ${empresaFija?`<input type="hidden" name="solicitanteFijo" value="${empresaFija}">`:''}
        </div>
      </div>
      <div class="actions">
        <button class="btn" type="submit">Generar solicitud</button>
      </div>
    </form>
  </div>`;
}

function renderMisSolicitudes(filtroCliente){
  let rows = STATE.solicitudes.slice();
  if(filtroCliente) rows = rows.filter(s=>s.solicitante===filtroCliente);
  return `<div class="panel">
    <div class="toolbar">
      <h2 style="margin:0">${filtroCliente? 'Mis solicitudes — '+filtroCliente : 'Solicitudes registradas'}</h2>
      <span class="stats">${rows.length} registro(s)</span>
    </div>
    ${rows.length? `<table><thead><tr><th>Fecha</th><th>Correlativo</th><th>Tipo</th><th>Medidas</th><th>Cant.</th><th>Solicitante</th><th>Estado</th><th>PDF</th><th></th></tr></thead>
    <tbody>${rows.map(s=>`<tr>
      <td>${s.fecha}</td><td class="mono">${s.correlativo}</td><td>${s.tipo}</td><td class="mono">${s.medida}</td>
      <td class="mono">${s.cantidad}</td><td>${s.solicitante}</td><td>${tagEstado(s.estado)}</td>
      <td><button class="btn secondary small" data-pdf="${s.id}">Ver PDF</button></td>
      <td>${s.estado==='Pendiente'? `<span class="icon-x" data-cancel="${s.id}" title="Cancelar">×</span>` : ''}</td>
    </tr>`).join('')}</tbody></table>` : '<div class="empty">No hay solicitudes registradas.</div>'}
  </div>`;
}

function renderStockPanel(){
  return `<div class="panel">
    <h2>Stock disponible en patio</h2>
    <div class="desc">Actualizado en tiempo real según ingresos y solicitudes recepcionadas en picadora.</div>
    ${tablaStock(STATE.stock,false)}
  </div>`;
}

function renderIngresar(){
  return `<div class="panel">
    <h2>Ingreso de parihuelas</h2>
    <div class="desc">Fecha y correlativo (ING-XXXX) se generan automáticamente. Adjuntar la guía en PDF.</div>
    <form id="formIngreso">
      <div class="grid">
        <div class="field"><label>Fecha</label><input type="text" value="${fechaHoy()}" disabled></div>
        <div class="field"><label>Correlativo</label><input type="text" value="Se genera al guardar" disabled></div>
        <div class="field"><label>Cliente</label><input list="clientesList" name="cliente" required>
          <datalist id="clientesList">${clientesUnicos().map(c=>`<option value="${c}">`).join('')}</datalist>
        </div>
        <div class="field"><label>Tipo de parihuela</label>${tiposDatalist('tiposList2')}</div>
        <div class="field"><label>Medidas (LxA)</label><input name="medida" required placeholder="Ej: 120x100"></div>
        <div class="field"><label>Cantidad</label><input name="cantidad" type="number" min="1" required></div>
        <div class="field"><label>Ingresante</label><input value="Despachos" disabled></div>
        <div class="field"><label>N° de guía</label><input name="guia" required placeholder="Ej: G-001-0004521"></div>
        <div class="field"><label>PDF de la guía</label><input type="file" name="pdf" accept="application/pdf"></div>
      </div>
      <div class="actions"><button class="btn" type="submit">Registrar ingreso</button></div>
    </form>
  </div>`;
}

function renderMovs(){
  return `<div class="panel">
    <div class="toolbar"><h2 style="margin:0">Ingresos registrados</h2><span class="stats">${STATE.ingresos.length} registro(s)</span></div>
    ${STATE.ingresos.length? `<table><thead><tr><th>Fecha</th><th>Correlativo</th><th>Cliente</th><th>Tipo</th><th>Medidas</th><th>Cant.</th><th>Guía</th><th>PDF</th></tr></thead>
    <tbody>${STATE.ingresos.map(i=>`<tr>
      <td>${i.fecha}</td><td class="mono">${i.correlativo}</td><td>${i.cliente}</td><td>${i.tipo}</td><td class="mono">${i.medida}</td>
      <td class="mono">${i.cantidad}</td><td class="mono">${i.guia}</td>
      <td><button class="btn secondary small" data-pdfing="${i.id}">Ver</button></td>
    </tr>`).join('')}</tbody></table>` : '<div class="empty">No hay ingresos registrados.</div>'}
  </div>`;
}

function renderStockFisicoPicadora(){
  return `<div class="panel">
    <div class="toolbar">
      <h2 style="margin:0">Stock del sistema vs. stock físico</h2>
      <div class="actions" style="margin:0"><button class="btn secondary" id="btnImprimirHoja">Imprimir hoja de inventario</button>
      <button class="btn" id="btnGuardarFisico">Guardar conteo físico</button></div>
    </div>
    <div class="desc">Ingresa el conteo físico por línea. La diferencia se calcula automáticamente.</div>
    ${tablaStock(STATE.stock, true)}
  </div>`;
}

function renderRecepcionPicadora(){
  return `<div class="panel">
    <h2>Recepción de correlativos</h2>
    <div class="desc">El montacarguista entrega la hoja de solicitud impresa. Ingresa aquí el correlativo y la cantidad físicamente recibida para validar contra el sistema.</div>
    <form id="formRecepcion" class="grid" style="align-items:end">
      <div class="field"><label>Fecha</label><input type="text" value="${fechaHoy()}" disabled></div>
      <div class="field"><label>Correlativo recibido</label><input name="correlativo" required placeholder="SOL-00001" style="text-transform:uppercase"></div>
      <div class="field"><label>Cantidad física recibida</label><input name="cantidadRecibida" type="number" min="0" placeholder="Opcional, por defecto = solicitado"></div>
      <div class="field"><button class="btn" type="submit">Registrar recepción</button></div>
    </form>
  </div>
  <div class="panel">
    <div class="toolbar"><h2 style="margin:0">Historial de recepciones</h2><span class="stats">${STATE.recepciones.length} registro(s)</span></div>
    ${STATE.recepciones.length? `<table><thead><tr><th>Fecha</th><th>Correlativo</th><th>Resultado</th><th>Detalle</th></tr></thead>
    <tbody>${STATE.recepciones.map(r=>`<tr><td>${r.fecha}</td><td class="mono">${r.correlativo}</td><td>${tagEstado(r.resultado)}</td><td>${r.detalle}</td></tr>`).join('')}</tbody></table>`
    : '<div class="empty">Sin recepciones registradas aún.</div>'}
  </div>`;
}

function renderSupervisionSolicitudes(){
  return `<div class="panel">
    <div class="toolbar">
      <h2 style="margin:0">Solicitudes</h2>
      <button class="btn secondary" id="btnImprimirPend">Imprimir pendientes (para montacarguista)</button>
    </div>
    ${renderMisSolicitudes(null)}
  </div>`.replace('<div class="panel">\n    <div class="toolbar">','<div class="toolbar">'); // simple wrap fix not needed, kept for clarity
}

function renderDBMaestra(){
  const rowsSol = STATE.solicitudes.map(s=>({...s, __tipo:'Solicitud'}));
  const rowsIng = STATE.ingresos.map(i=>({...i, __tipo:'Ingreso'}));
  return `<div class="panel">
    <h2>Base de datos maestra</h2>
    <div class="desc">Vista completa y editable de todos los movimientos. Los cambios aquí impactan el stock recalculado.</div>
    <h3 style="font-family:var(--disp);font-size:14px;margin-top:18px">Solicitudes (${rowsSol.length})</h3>
    <table><thead><tr><th>Fecha</th><th>Correlativo</th><th>Solicitante</th><th>Tipo</th><th>Medidas</th><th>Cant.</th><th>Cant. recibida</th><th>Estado</th><th></th></tr></thead>
    <tbody>${rowsSol.map(s=>`<tr>
      <td>${s.fecha}</td><td class="mono">${s.correlativo}</td><td>${s.solicitante}</td><td>${s.tipo}</td><td class="mono">${s.medida}</td>
      <td><input type="number" style="width:70px" data-editsol-cant="${s.id}" value="${s.cantidad}"></td>
      <td class="mono">${s.cantidadRecibida??'—'}</td>
      <td><select data-editsol-estado="${s.id}">
          ${['Pendiente','Recepcionada','Cancelada'].map(e=>`<option ${s.estado===e?'selected':''}>${e}</option>`).join('')}
        </select></td>
      <td><span class="icon-x" data-delsol="${s.id}">×</span></td>
    </tr>`).join('') || '<tr><td colspan="9">Sin datos</td></tr>'}</tbody></table>

    <h3 style="font-family:var(--disp);font-size:14px;margin-top:22px">Ingresos (${rowsIng.length})</h3>
    <table><thead><tr><th>Fecha</th><th>Correlativo</th><th>Cliente</th><th>Tipo</th><th>Medidas</th><th>Cant.</th><th>Guía</th><th></th></tr></thead>
    <tbody>${rowsIng.map(i=>`<tr>
      <td>${i.fecha}</td><td class="mono">${i.correlativo}</td><td>${i.cliente}</td><td>${i.tipo}</td><td class="mono">${i.medida}</td>
      <td><input type="number" style="width:70px" data-editing-cant="${i.id}" value="${i.cantidad}"></td>
      <td class="mono">${i.guia}</td>
      <td><span class="icon-x" data-deling="${i.id}">×</span></td>
    </tr>`).join('') || '<tr><td colspan="8">Sin datos</td></tr>'}</tbody></table>
    <div class="actions"><button class="btn" id="btnAplicarDB">Aplicar cambios y recalcular stock</button></div>
  </div>`;
}

/* ============================= MAIN RENDER ============================= */
function render(){
  const role = ROLES[STATE.role];
  document.getElementById('roleBadge').textContent = role.label;

  // tabs
  const tabsEl = document.getElementById('tabs');
  if(!role.tabs.includes(STATE.activeTab)) STATE.activeTab = role.tabs[0];
  tabsEl.innerHTML = role.tabs.map(t=>`<button data-tab="${t}" class="${t===STATE.activeTab?'active':''}">${TAB_LABEL[t]}</button>`).join('');
  tabsEl.querySelectorAll('button').forEach(b=>b.addEventListener('click', ()=>{ STATE.activeTab=b.dataset.tab; render(); }));

  const content = document.getElementById('content');
  const empresaFija = role.empresa || null;

  switch(STATE.activeTab){
    case 'nueva': content.innerHTML = renderNuevaSolicitud(empresaFija); bindFormSolicitud(); break;
    case 'mis': content.innerHTML = renderMisSolicitudes(empresaFija); bindTablaSolicitudes(); break;
    case 'solicitar': content.innerHTML = renderNuevaSolicitud(null); bindFormSolicitud(); break;
    case 'ingresar': content.innerHTML = renderIngresar(); bindFormIngreso(); break;
    case 'movs': content.innerHTML = renderMovs(); bindTablaIngresos(); break;
    case 'stock': content.innerHTML = renderStockPanel(); break;
    case 'stockfis': content.innerHTML = renderStockFisicoPicadora(); bindStockFisico(); break;
    case 'recepcion': content.innerHTML = renderRecepcionPicadora(); bindRecepcion(); break;
    case 'solicitudes':
      content.innerHTML = `<div class="panel"><div class="toolbar"><h2 style="margin:0">Solicitudes</h2>
        <button class="btn secondary" id="btnImprimirPend2">Imprimir pendientes para montacarguista</button></div></div>`
        + renderMisSolicitudes(null);
      document.getElementById('btnImprimirPend2').addEventListener('click', imprimirSolicitudesPendientes);
      bindTablaSolicitudes();
      break;
    case 'ingresos': content.innerHTML = renderMovs(); bindTablaIngresos(); break;
    case 'db': content.innerHTML = renderDBMaestra(); bindDB(); break;
  }
}

/* ============================= BINDINGS ============================= */
function bindFormSolicitud(){
  const f = document.getElementById('formSolicitud');
  if(!f) return;
  f.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(f);
    const solicitante = fd.get('solicitanteFijo') || fd.get('solicitante');
    await createSolicitud({
      tipo: fd.get('tipo'), medida: fd.get('medida'), cantidad: fd.get('cantidad'),
      solicitante, creadoPor: ROLES[STATE.role].label
    });
    render();
  });
}
function bindTablaSolicitudes(){
  document.querySelectorAll('[data-cancel]').forEach(el=>el.addEventListener('click', ()=>cancelarSolicitud(el.dataset.cancel)));
  document.querySelectorAll('[data-pdf]').forEach(el=>el.addEventListener('click', ()=>{
    const s = STATE.solicitudes.find(x=>x.id===el.dataset.pdf); if(s) pdfSolicitud(s);
  }));
  const btn = document.getElementById('btnImprimirPend');
  if(btn) btn.addEventListener('click', imprimirSolicitudesPendientes);
}
function bindFormIngreso(){
  const f = document.getElementById('formIngreso');
  if(!f) return;
  f.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(f);
    const file = fd.get('pdf') && fd.get('pdf').size>0 ? fd.get('pdf') : null;
    await createIngreso({
      cliente: fd.get('cliente'), tipo: fd.get('tipo'), medida: fd.get('medida'),
      cantidad: fd.get('cantidad'), guia: fd.get('guia')
    }, file);
    render();
  });
}
function bindTablaIngresos(){
  document.querySelectorAll('[data-pdfing]').forEach(el=>el.addEventListener('click', ()=>{
    const i = STATE.ingresos.find(x=>x.id===el.dataset.pdfing); if(i) pdfIngreso(i);
  }));
}
function bindStockFisico(){
  const btnImp = document.getElementById('btnImprimirHoja');
  if(btnImp) btnImp.addEventListener('click', imprimirHojaInventario);
  const btnGuardar = document.getElementById('btnGuardarFisico');
  if(btnGuardar) btnGuardar.addEventListener('click', async ()=>{
    const inputs = document.querySelectorAll('[data-fisico]');
    for(const inp of inputs){ await guardarStockFisico(inp.dataset.fisico, inp.value); }
    toast('Conteo físico guardado');
    render();
  });
}
function bindRecepcion(){
  const f = document.getElementById('formRecepcion');
  if(!f) return;
  f.addEventListener('submit', async e=>{
    e.preventDefault();
    const fd = new FormData(f);
    const log = await recepcionarCorrelativo(fd.get('correlativo'), fd.get('cantidadRecibida'));
    if(log.resultado==='OK') toast('Recepción OK — '+log.detalle);
    else toast(log.resultado+': '+log.detalle, true);
    render();
  });
}
function bindDB(){
  document.querySelectorAll('[data-delsol]').forEach(el=>el.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar esta solicitud del historial?')) return;
    STATE.solicitudes = STATE.solicitudes.filter(s=>s.id!==el.dataset.delsol);
    await saveSolicitudes(); recomputeStock(); render();
  }));
  document.querySelectorAll('[data-deling]').forEach(el=>el.addEventListener('click', async ()=>{
    if(!confirm('¿Eliminar este ingreso del historial?')) return;
    STATE.ingresos = STATE.ingresos.filter(i=>i.id!==el.dataset.deling);
    await saveIngresos(); recomputeStock(); render();
  }));
  const btn = document.getElementById('btnAplicarDB');
  if(btn) btn.addEventListener('click', async ()=>{
    document.querySelectorAll('[data-editsol-cant]').forEach(inp=>{
      const s = STATE.solicitudes.find(x=>x.id===inp.dataset.editsolCant); if(s) s.cantidad = Number(inp.value);
    });
    document.querySelectorAll('[data-editsol-estado]').forEach(sel=>{
      const s = STATE.solicitudes.find(x=>x.id===sel.dataset.editsolEstado); if(s) s.estado = sel.value;
    });
    document.querySelectorAll('[data-editing-cant]').forEach(inp=>{
      const i = STATE.ingresos.find(x=>x.id===inp.dataset.editingCant); if(i) i.cantidad = Number(inp.value);
    });
    await saveSolicitudes(); await saveIngresos();
    recomputeStock();
    toast('Cambios aplicados y stock recalculado');
    render();
  });
}

/* ============================= ROLE SELECT ============================= */
function initRoleSelect(){
  const sel = document.getElementById('roleSelect');
  sel.innerHTML = Object.entries(ROLES).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
  sel.value = STATE.role;
  sel.addEventListener('change', ()=>{ STATE.role = sel.value; STATE.activeTab=null; render(); });
}

/* ============================= ERROR HANDLING ============================= */
function showFatalError(msg){
  const box = document.createElement('div');
  box.style.cssText = 'position:fixed;inset:0;background:#14181c;color:#eef1f4;padding:30px;font-family:sans-serif;z-index:9999;overflow:auto;';
  box.innerHTML = '<h2 style="color:#e5573f">Ocurrió un error al cargar la aplicación</h2>'
    + '<p>Copia este mensaje y compártelo para poder solucionarlo:</p>'
    + '<pre style="background:#1c2126;padding:14px;border-radius:6px;white-space:pre-wrap;border:1px solid #333c46;">'+msg+'</pre>';
  document.body.appendChild(box);
}
window.addEventListener('error', e=>{ showFatalError((e.error && e.error.stack) || e.message || String(e)); });
window.addEventListener('unhandledrejection', e=>{ showFatalError('Promesa rechazada: ' + (e.reason && (e.reason.stack||e.reason.message) || String(e.reason))); });

/* ============================= INIT ============================= */
(async function init(){
  try{
    initRoleSelect();
    if(typeof window.storage === 'undefined'){
      toast('Almacenamiento compartido no disponible en este entorno: los datos no se guardarán entre sesiones.', true);
    }
    await loadAll();
    render();
    // light polling so concurrent users see updates without a hard refresh
    setInterval(async ()=>{
      await loadAll();
      render();
    }, 15000);
  }catch(err){
    showFatalError((err && err.stack) || String(err));
  }
})();
</script>
</body>
</html>
